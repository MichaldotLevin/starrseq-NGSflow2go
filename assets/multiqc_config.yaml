# MultiQC Configuration for STARR-seq / CapSTARR-seq Pipeline

report_comment: >
    This report has been generated by the STARR-seq / CapSTARR-seq 
    Nextflow pipeline converted from Bpipe.

report_header_info:
    - Application: 'STARR-seq / CapSTARR-seq Analysis'
    - Converted from: 'Bpipe pipeline'

# Workflow summary
custom_data:
    workflow_summary:
        description: 'Pipeline configuration and parameters'

# Order of module outputs
module_order:
    - fastqc:
        name: 'FastQC (raw reads)'
        path_filters:
            - '*_fastqc.html'
    - fastq_screen:
        name: 'FastQ Screen'
    - cutadapt:
        name: 'Cutadapt'
    - fastqc:
        name: 'FastQC (trimmed reads)'
        path_filters:
            - '*_trimmed_fastqc.html'
    - bowtie2:
        name: 'Bowtie2'
    - samtools:
        name: 'Samtools'
    - picard:
        name: 'Picard'
    - deeptools:
        name: 'deepTools'
    - macs2:
        name: 'MACS2'
    - featureCounts:
        name: 'featureCounts'
    - dupradar:
        name: 'dupRadar'

# Customize table columns
table_columns_visible:
    FastQC:
        percent_duplicates: True
        percent_gc: True
        avg_sequence_length: True
        total_sequences: True
    Bowtie2:
        overall_alignment_rate: True
        aligned_reads: True
    Samtools:
        mapped_passed: True
        error_rate: True
    Picard:
        PERCENT_DUPLICATION: True

# Filename patterns to ignore
fn_ignore_files:
    - '*.run'
    - '*.log'
    - '.command.*'

# Clean up sample names
fn_clean_exts:
    - '.fastq.gz'
    - '.fastq'
    - '.fq.gz'
    - '.fq'
    - '_R1'
    - '_R2'
    - '_1'
    - '_2'
    - '.sorted'
    - '.markdup'
    - '.bam'

# Custom content
custom_content:
    order:
        - pipeline_versions

# Report sections
report_section_order:
    software_versions:
        order: -1000
    workflow_summary:
        order: -1001
    
# Ignore very low coverage samples
picard_config:
    general_stats_target_coverage:
        - 10
        - 30
        - 50

# Make plots interactive
plots_force_interactive: True

# Export plots as static images
export_plots: True
