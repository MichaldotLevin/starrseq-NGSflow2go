# =========================================================
# STARR-seq Pipeline Parameters - Custom Registry Example
# =========================================================
# This example demonstrates how to use containers from a custom registry
# with the registry/name/tag format structure
#
# Container Format Options:
# 1. Simple string format (original):
#    fastqc_container: 'biocontainers/fastqc:0.12.1--hdfd78af_0'
#
# 2. Map format with custom registry (new):
#    fastqc_container:
#      name: 'fastqc'
#      tag: '0.11.9r0'
#      registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'
#
# 3. Compact map format (single line):
#    fastqc_container: { name: 'fastqc', tag: '0.11.9r0', registry: 'registry.gitlab.rlp.net/imbforge/imb-registry' }

# =========================================================
# Required Input/Output Parameters
# =========================================================

input: 'samplesheet.csv'
outdir: './results'

# =========================================================
# Reference Files
# =========================================================

bowtie2_index: '/path/to/genome/index/genome'
chromsizes: '/path/to/genome.chrom.sizes'
genes_gtf: null  # Required for CapSTARR-seq mode

# =========================================================
# Container Configurations - Custom Registry Format
# =========================================================
# All containers specified using custom registry structure

# Quality Control
fastqc_container:
  name: 'fastqc'
  tag: '0.11.9r0'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

multiqc_container:
  name: 'multiqc'
  tag: '1.15'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# Trimming and Filtering
cutadapt_container:
  name: 'cutadapt'
  tag: '4.4'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# Alignment
bowtie2_container:
  name: 'bowtie2'
  tag: '2.4.5'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# SAM/BAM Processing
samtools_container:
  name: 'samtools'
  tag: '1.17'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

picard_container:
  name: 'picard'
  tag: '3.0.0'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# Peak Calling
macs2_container:
  name: 'macs2'
  tag: '2.2.7.1'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

starrpeaker_container:
  name: 'starrpeaker'
  tag: '1.3.2'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# Visualization and Analysis
deeptools_container:
  name: 'deeptools'
  tag: '3.5.2'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# R/Bioconductor Packages
r_container:
  name: 'r-base'
  tag: '4.2.2'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

deseq2_container:
  name: 'bioconductor-deseq2'
  tag: '1.36.0'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

dupradar_container:
  name: 'bioconductor-dupradar'
  tag: '1.26.0'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# Feature Counting
subread_container:
  name: 'subread'
  tag: '2.0.4'
  registry: 'registry.gitlab.rlp.net/imbforge/imb-registry'

# Optional Tools (compact format example)
fastq_screen_container: { name: 'fastq-screen', tag: '0.15.3', registry: 'registry.gitlab.rlp.net/imbforge/imb-registry' }
phantompeakqualtools_container: { name: 'phantompeakqualtools', tag: '1.2.2', registry: 'registry.gitlab.rlp.net/imbforge/imb-registry' }

# Base system container
base_container:
  name: 'ubuntu'
  tag: '22.04'
  registry: 'docker.io'  # Can mix registries as needed

# =========================================================
# Analysis Mode Settings
# =========================================================

# Analysis mode: 'starrseq', 'capstarrseq', or 'both'
analysis_mode: 'starrseq'

# =========================================================
# Optional Process Settings
# =========================================================

# Trimming
run_cutadapt: false

# QC
run_fastq_screen: false

# Duplicate handling
run_markdup: true  # Use Picard MarkDuplicates
run_rmdup: false   # Use samtools rmdup (alternative)

# Peak callers
run_macs2: true
run_starrpeaker: true

# =========================================================
# Process-Specific Arguments
# =========================================================

# Cutadapt trimming parameters
cutadapt_args: '-q 20 -m 20'

# Bowtie2 alignment parameters  
bowtie2_args: '--local --very-sensitive-local --no-unal --no-mixed --no-discordant --phred33'

# MACS2 peak calling parameters
macs2_gsize: 'hs'  # Effective genome size: 'hs' for human, 'mm' for mouse
macs2_qvalue: 0.05

# STARRPeaker parameters
starrpeaker_threshold: 2.0
starrpeaker_min_length: 50
