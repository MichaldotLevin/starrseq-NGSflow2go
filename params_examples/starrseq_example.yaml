##########################################################################################
# EXAMPLE: Standard STARR-seq Analysis
##########################################################################################
# This example shows configuration for a typical STARR-seq experiment
# with peak calling using MACS2 and coverage track generation.
##########################################################################################

# Input/Output
input: 'samplesheet.csv'
outdir: 'results_starrseq'

# Pipeline Mode - Standard STARR-seq (not CapSTARR-seq)
capstarrseq_mode: false

# Reference Genome
genome: 'hg38'
bowtie2_index: '/data/genomes/hg38/bowtie2/hg38'
chromsizes: '/data/genomes/hg38/hg38.chrom.sizes'

# Analysis Steps
run_cutadapt: true
run_fastq_screen: false
run_deeptools: true
run_macs2: true
run_starrpeaker: false
run_phantompeak: true

# Trimming
cutadapt_adapter: 'AGATCGGAAGAGC'
cutadapt_min_length: 20

# Alignment
bowtie2_args: '--very-sensitive --no-mixed --no-discordant'

# Duplicate handling
markdup_method: 'picard'

# Peak Calling
macs2_gsize: 'hs'
macs2_qvalue: 0.05

# Resources
max_cpus: 16
max_memory: '128.GB'
max_time: '240.h'

# Container Images - using default BioContainers
# See params.yaml for complete list with descriptions
fastqc_container: 'biocontainers/fastqc:0.12.1--hdfd78af_0'
cutadapt_container: 'biocontainers/cutadapt:4.4--py39hf95cd2a_1'
bowtie2_container: 'biocontainers/mulled-v2-ac74a7f02cebcfcc07d8e8d1d750af9c83b4d45a:1744f68fe955578c63054b55309e05b41c37a80d-0'
samtools_container: 'biocontainers/samtools:1.17--h00cdaf9_0'
picard_container: 'biocontainers/picard:3.0.0--hdfd78af_1'
deeptools_container: 'biocontainers/deeptools:3.5.2--pyhdfd78af_1'
macs2_container: 'biocontainers/macs2:2.2.7.1--py39hf95cd2a_4'
phantompeakqualtools_container: 'biocontainers/phantompeakqualtools:1.2.2--hdfd78af_2'
multiqc_container: 'biocontainers/multiqc:1.15--pyhdfd78af_0'
