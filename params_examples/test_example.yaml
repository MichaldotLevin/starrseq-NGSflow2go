##########################################################################################
# EXAMPLE: Test Run with Minimal Resources
##########################################################################################
# This example shows configuration for a quick test run with reduced resources.
# Useful for testing the pipeline setup or running on smaller datasets.
##########################################################################################

# Input/Output
input: 'test_data/samplesheet.csv'
outdir: 'test_results'

# Pipeline Mode
capstarrseq_mode: false

# Reference Genome (use small test genome)
genome: 'test'
bowtie2_index: 'test_data/genome/test_genome'
chromsizes: 'test_data/genome/test.chrom.sizes'

# Analysis Steps - minimal for testing
run_cutadapt: false
run_fastq_screen: false
run_deeptools: true
run_macs2: true
run_starrpeaker: false
run_phantompeak: false

# Alignment
bowtie2_args: '--very-sensitive'

# Duplicate handling
markdup_method: 'samtools'  # Faster for testing

# Peak Calling
macs2_gsize: '1.0e8'  # Small test genome size
macs2_qvalue: 0.1

# Resources - limited for testing
max_cpus: 2
max_memory: '6.GB'
max_time: '1.h'

# Container Images - using default BioContainers
# See params.yaml for complete list with descriptions
fastqc_container: 'biocontainers/fastqc:0.12.1--hdfd78af_0'
bowtie2_container: 'biocontainers/mulled-v2-ac74a7f02cebcfcc07d8e8d1d750af9c83b4d45a:1744f68fe955578c63054b55309e05b41c37a80d-0'
samtools_container: 'biocontainers/samtools:1.17--h00cdaf9_0'
deeptools_container: 'biocontainers/deeptools:3.5.2--pyhdfd78af_1'
macs2_container: 'biocontainers/macs2:2.2.7.1--py39hf95cd2a_4'
multiqc_container: 'biocontainers/multiqc:1.15--pyhdfd78af_0'
